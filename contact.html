<!DOCTYPE HTML>
<html lang="en">
	<head>
		<title>Contact — Tiny Rest</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<meta name="description" content="Get in touch with the Tiny Rest team for questions, feedback, or support." />
		<link rel="stylesheet" href="assets/css/main.css" />
		<noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>
	</head>
	<body class="is-preload">

		<div id="wrapper">

			<header id="header" class="app-header app-header-inner">
				<div class="app-nav">
					<a href="index.html" class="app-logo-link">
						<img src="images/splash-icon.png" alt="Tiny Rest" class="app-logo" />
					</a>
					<nav class="app-nav-links" aria-label="Primary">
						<a href="why.html">Why Tiny Rest</a>
						<a href="wake-windows.html">Wake Windows</a>
						<a href="features.html">Features</a>
						<a href="contact.html" class="is-active">Contact</a>
					</nav>
					<div class="app-nav-cta">
						<a class="button primary app-cta" href="index.html#download">Get It Now</a>
					</div>
				</div>
			</header>

			<div class="app-content">

				<section class="app-section">
					<div class="app-card app-card-form">
						<h1 class="app-page-title">Contact</h1>
						<p>Questions, feedback, or support? We'd love to hear from you.</p>
						<form method="post" action="#">
							<div class="fields">
								<div class="field half">
									<label for="name">Name</label>
									<input type="text" name="name" id="name" />
								</div>
								<div class="field half">
									<label for="email">Email</label>
									<input type="text" name="email" id="email" />
								</div>
								<div class="field">
									<label for="message">Message</label>
									<textarea name="message" id="message" rows="4"></textarea>
								</div>
							</div>
							<ul class="actions">
								<li><input type="submit" value="Send Message" class="primary" /></li>
								<li><input type="reset" value="Reset" /></li>
							</ul>
						</form>
					</div>
				</section>

			</div>

			<footer id="footer">
				<p class="copyright">&copy; Tiny Rest. Built for iOS. <a href="privacy.html">Privacy Policy</a></p>
			</footer>

		</div>

		<div id="bg"></div>

		<script src="assets/js/jquery.min.js"></script>
		<script src="assets/js/browser.min.js"></script>
		<script src="assets/js/breakpoints.min.js"></script>
		<script src="assets/js/util.js"></script>
		<script src="assets/js/main.js"></script>

	</body>
</html>
